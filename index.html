        }

        h1 {

            color: var(--text-main);
            font-size: 24px;
        }

            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;

            width: 100%;
            margin-bottom: 25px;
            transition: background-color 0.3s;
        }
        .btn-save:hover {

        }
        .links-container {

            flex-direction: column;
            gap: 12px;
        }
        .link-btn {

            text-decoration: none;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .link-btn:hover {
            background-color: var(--bg-color);

        .wallet-container {

            gap: 15px;
            margin-top: 35px; 
            padding-top: 20px;

        .wallet-badge {

            width: auto;
            transition: transform 0.3s ease;
        }
        .wallet-badge:hover {

    <script>
        function descargarVCard() {
            const img = document.getElementById('miFoto');
            const canvas = document.createElement('canvas');
            
            const tamaño = 200;
            canvas.width = tamaño;
            canvas.height = tamaño;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(img, 0, 0, tamaño, tamaño);
            
            let base64Photo = "";
            try {
                const dataURL = canvas.toDataURL('image/jpeg', 0.8);
                base64Photo = dataURL.split(',')[1];
            } catch (e) {
                console.log("No se pudo procesar la foto.");
            }

            const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:Cuartas Arango;Yarid Antonio;;;\nFN:Yarid Antonio Cuartas Arango\nORG:Michigan Corporation\nTITLE:COO\nTEL;TYPE=WORK,VOICE:+51913032564\nEMAIL;TYPE=WORK:y.cuartas@michigancorp.edu.pe\nURL:https://www.michigancorp.pe/\nPHOTO;ENCODING=b;TYPE=JPEG:${base64Photo}\nEND:VCARD`;

            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            const enlace = document.createElement("a");
            enlace.href = url;
            enlace.download = "Yarid_Antonio_Contacto.vcf";
            document.body.appendChild(enlace);
            enlace.click();
            document.body.removeChild(enlace);
            URL.revokeObjectURL(url);
        }
    </script>
